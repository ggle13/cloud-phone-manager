<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" style="stop-color:#E3F2FD" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1565C0" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景圆 -->
  <circle cx="54" cy="54" r="52" fill="url(#bg)"/>

  <!-- 云朵主体 -->
  <g filter="url(#shadow)">
    <!-- 云朵大圆 -->
    <circle cx="54" cy="58" r="20" fill="url(#cloud)"/>
    <!-- 云朵左圆 -->
    <circle cx="38" cy="62" r="13" fill="url(#cloud)"/>
    <!-- 云朵右圆 -->
    <circle cx="68" cy="60" r="14" fill="url(#cloud)"/>
    <!-- 云朵顶部小圆 -->
    <circle cx="46" cy="48" r="10" fill="url(#cloud)"/>
    <!-- 云朵顶部中圆 -->
    <circle cx="58" cy="44" r="12" fill="url(#cloud)"/>
  </g>

  <!-- 手机轮廓（浮在云上）-->
  <g transform="translate(54, 46)">
    <!-- 手机外壳圆角矩形 -->
    <rect x="-13" y="-20" width="26" height="40" rx="5" ry="5"
          fill="none" stroke="white" stroke-width="2.5"/>
    <!-- 屏幕区域 -->
    <rect x="-11" y="-17" width="22" height="30" rx="2" ry="2"
          fill="white" fill-opacity="0.25"/>
    <!-- 屏幕内容线（模拟界面）-->
    <rect x="-9" y="-14" width="14" height="2" rx="1" fill="white" fill-opacity="0.6"/>
    <rect x="-9" y="-10" width="18" height="2" rx="1" fill="white" fill-opacity="0.4"/>
    <rect x="-9" y="-6" width="12" height="2" rx="1" fill="white" fill-opacity="0.4"/>
    <rect x="-9" y="-2" width="16" height="2" rx="1" fill="white" fill-opacity="0.4"/>
    <!-- 屏幕按钮/指示灯 -->
    <circle cx="0" cy="16" r="2" fill="white" fill-opacity="0.8"/>
    <!-- 手机听筒 -->
    <rect x="-4" y="-19" width="8" height="1.5" rx="0.75" fill="white" fill-opacity="0.7"/>
  </g>

  <!-- 信号波纹（右上角）-->
  <g stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M 72 30 Q 76 26, 80 30"/>
    <path d="M 74 33 Q 78 29, 82 33"/>
  </g>
</svg>
