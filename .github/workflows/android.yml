name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Commit APK to repo
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_NAME=$(basename $APK_PATH)
          
          # Get file info
          FILE_SHA=$(git hash-object -w $APK_PATH)
          
          # Update git index
          git checkout --orphan temp_branch
          git reset --hard
          cp $APK_PATH ./$APK_NAME
          git add $APK_NAME
          git commit -m "Build APK: $APK_NAME (run #$GITHUB_RUN_NUMBER)"
          git filter-branch --force --prune-empty --subdirectory-filter . HEAD
          git push -f HEAD:refs/heads/apk-build || true
          
          # Also commit to main with APK
          git checkout main
          mkdir -p releases
          cp $APK_PATH releases/$APK_NAME
          git add releases/$APK_NAME
          git commit --allow-empty -m "Build: $APK_NAME (run #$GITHUB_RUN_NUMBER)"
          git push
