name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Push APK to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_NAME=$(basename $APK)
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add APK as a blob directly to git index (no checkout needed)
          BLOB_SHA=$(git hash-object -w "$APK")
          git --bare ls-tree main releases >/dev/null 2>&1 || \
            git ls-tree main -- releases 2>/dev/null || echo "no_releases_dir"
          
          # Use git update-index to add without checkout
          git update-index --add --cacheinfo 100644,$BLOB_SHA,"releases/$APK_NAME"
          TREE_SHA=$(git write-tree)
          
          # Get current commit SHA
          COMMIT_SHA=$(git rev-parse main)
          
          # Create commit
          NEW_COMMIT_SHA=$(git commit-tree -p $COMMIT_SHA -m "Build: $APK_NAME (run #$GITHUB_RUN_NUMBER)" $TREE_SHA)
          
          # Push to main
          git push origin $NEW_COMMIT_SHA:main
          
          echo "✅ APK pushed to releases/$APK_NAME"
