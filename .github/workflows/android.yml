name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Show environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "=== SDK contents ==="
          ls $ANDROID_HOME/
          echo "=== cmdline-tools ==="
          ls $ANDROID_HOME/cmdline-tools/ 2>/dev/null || echo "no cmdline-tools"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "no build-tools"

      - name: Build debug APK
        run: |
          set -e
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -100

      - name: Show build output
        run: |
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK dir"
          find app/build -name "*.apk" 2>/dev/null || echo "No APK found"
