name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_NAME=$(basename $APK)
          
          # Create or update draft release
          TAG="v${GITHUB_RUN_NUMBER}"
          BODY="Build #$GITHUB_RUN_NUMBER | Commit: ${GITHUB_SHA:0:7}"
          
          # Check if release exists
          EXISTING=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          
          if [ "$(echo $EXISTING | python3 -c 'import sys,json; print(len(json.load(sys.stdin).get("id","")))')" -gt "0" ]; then
            echo "Release exists, deleting..."
            RELEASE_ID=$(echo $EXISTING | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
          fi
          
          # Create draft release
          RELEASE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"CloudPhoneManager $TAG\",\"draft\":true,\"body\":\"$BODY\"}")
          
          UPLOAD_URL=$(echo $RELEASE | python3 -c "import sys,json; print(json.load(sys.stdin).get('upload_url','').replace('{?name,label}',''))")
          RELEASE_ID=$(echo $RELEASE | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          
          echo "Created release $RELEASE_ID"
          echo "Upload URL: $UPLOAD_URL"
          
          # Upload APK
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK" \
            "${UPLOAD_URL}?name=${APK_NAME}"
          
          echo ""
          echo "✅ Release URL: https://github.com/${{ github.repository }}/releases/$RELEASE_ID"
